name: Update World Cup results

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:          # lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest scores
        run: node fetch-results.js

      - name: Commit results.json if it changed
        run: |
          git config user.name "wc-sweepstake-bot"
          git config user.email "actions@users.noreply.github.com"
          if [ -n "$(git status --porcelain results.json)" ]; then
            git add results.json
            git commit -m "Update results $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "No change in results."
          fi
